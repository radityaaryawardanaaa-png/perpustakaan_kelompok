<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Perpustakaan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: white; border-radius: 15px; padding: 40px;
            width: 100%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .login-icon { font-size: 60px; color: #667eea; margin-bottom: 20px; }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none; padding: 12px; font-weight: bold;
        }
        .mode-switch {
            position: fixed; bottom: 20px; right: 20px;
            background: white; padding: 10px 20px; border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="login-box text-center">
        <i class="fas fa-book-reader login-icon"></i>
        <h3 class="mb-4">Perpustakaan</h3>
        <div id="error" class="alert alert-danger d-none"></div>
        <form id="loginForm">
            <div class="mb-3 text-start">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" id="username" class="form-control" value="admin" required>
                </div>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" id="password" class="form-control" value="admin123" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-login w-100 text-white">
                <i class="fas fa-sign-in-alt me-2"></i> Login
            </button>
        </form>
        <hr class="my-4">
        <small class="text-muted">Default: admin / admin123</small>
    </div>

    <div class="mode-switch">
        <small><i class="fas fa-code me-2"></i>Mode: <strong>HTML/JS</strong></small><br>
        <a href="login.php" class="text-primary"><small>Switch ke PHP Mode →</small></a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if (user === 'admin' && pass === 'admin123') {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('nama', 'Administrator');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('error').classList.remove('d-none');
                document.getElementById('error').textContent = 'Username atau password salah!';
            }
        });
    </script>
</body>
</html>
