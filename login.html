<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Perpustakaan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    font-family:Arial;
}

.login-box{
    width:400px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo i{
    font-size:60px;
    color:#4e73df;
}

.logo h2{
    margin-top:10px;
    font-weight:bold;
}

.form-control{
    height:50px;
    border-radius:10px;
}

.btn-login{
    height:50px;
    border-radius:10px;
    background:#4e73df;
    color:white;
    font-weight:bold;
    border:none;
}

.btn-login:hover{
    background:#224abe;
}

</style>

</head>

<body>

<div class="login-box">

    <!-- LOGO -->
    <div class="logo">

        <i class="fas fa-book-reader"></i>

        <h2>PERPUSTAKAAN</h2>

        <p class="text-muted">
            Silakan login terlebih dahulu
        </p>

    </div>


    <!-- FORM -->
    <div class="mb-3">

        <label>Username</label>

        <input type="text"
        id="username"
        class="form-control"
        placeholder="Masukkan Username">

    </div>


    <div class="mb-4">

        <label>Password</label>

        <input type="password"
        id="password"
        class="form-control"
        placeholder="Masukkan Password">

    </div>


    <button class="btn-login w-100"
    onclick="login()">

        <i class="fas fa-sign-in-alt me-2"></i>

        LOGIN

    </button>

</div>


<script>

function login(){

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;


if(username == "admin" && password == "123"){

window.location.href = "dashboard.html";

}else{

alert("Username atau Password Salah!");

}

}

</script>

</body>
</html>
