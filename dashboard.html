<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Perpustakaan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
    margin:0;
    background:#eef2f7;
    font-family:Arial;
}

.sidebar{
    width:260px;
    height:100vh;
    background:linear-gradient(180deg,#4e73df,#224abe);
    position:fixed;
    color:white;
}

.logo{
    text-align:center;
    padding:30px;
    border-bottom:1px solid rgba(255,255,255,0.2);
}

.logo i{
    font-size:45px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px 25px;
    transition:0.3s;
}

.sidebar a:hover{
    background:rgba(255,255,255,0.2);
    padding-left:35px;
}

.active{
    background:rgba(255,255,255,0.2);
}

.main{
    margin-left:260px;
    padding:25px;
}

.topbar{
    background:white;
    padding:20px;
    border-radius:20px;
    margin-bottom:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.stats-card{
    color:white;
    border-radius:20px;
    padding:25px;
    position:relative;
    overflow:hidden;
}

.stats-card i{
    position:absolute;
    right:20px;
    bottom:20px;
    font-size:50px;
    opacity:0.2;
}

.number{
    font-size:35px;
    font-weight:bold;
}

.card-box{
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo">

        <i class="fas fa-book-reader"></i>

        <h4 class="mt-2">
            PERPUSTAKAAN
        </h4>

    </div>

    <a href="dashboard.html" class="active">

        <i class="fas fa-home me-2"></i>

        Dashboard

    </a>

    <a href="anggota.html">

        <i class="fas fa-users me-2"></i>

        Anggota

    </a>

    <a href="buku.html">

        <i class="fas fa-book me-2"></i>

        Buku

    </a>

    <a href="peminjaman.html">

        <i class="fas fa-hand-holding me-2"></i>

        Peminjaman

    </a>

    <a href="dipinjam.html">

        <i class="fas fa-book-reader me-2"></i>

        Buku Dipinjam

    </a>

</div>



<!-- MAIN -->
<div class="main">

    <!-- TOPBAR -->
    <div class="topbar d-flex justify-content-between align-items-center">

        <div>

            <h3>

                <i class="fas fa-home text-primary me-2"></i>

                Dashboard

            </h3>

            <small class="text-muted">

                Selamat datang di sistem perpustakaan

            </small>

        </div>

        <div>

            <i class="fas fa-user-circle me-2"></i>

            Admin

        </div>

    </div>



    <!-- STATS -->
    <div class="row mb-4" id="stats">

    </div>



    <!-- TABLE -->
    <div class="card-box">

        <h5 class="mb-4">

            <i class="fas fa-book-reader text-warning me-2"></i>

            Buku Sedang Dipinjam

        </h5>

        <div class="table-responsive">

            <table class="table table-hover">

                <thead class="table-dark">

                    <tr>

                        <th>No</th>
                        <th>Nama Peminjam</th>
                        <th>Judul Buku</th>
                        <th>Tanggal</th>

                    </tr>

                </thead>

                <tbody id="bukuDipinjam">

                </tbody>

            </table>

        </div>

    </div>

</div>



<script>

let dataPinjam =
JSON.parse(localStorage.getItem("pinjam")) || [];



// ======================
// DASHBOARD CARD
// ======================

document.getElementById("stats").innerHTML = `

<div class="col-md-4 mb-3">

<div class="stats-card bg-primary">

<h5>Total Buku</h5>

<div class="number">10</div>

<i class="fas fa-book"></i>

</div>

</div>



<div class="col-md-4 mb-3">

<div class="stats-card bg-success">

<h5>Buku Dipinjam</h5>

<div class="number">

${dataPinjam.length}

</div>

<i class="fas fa-book-reader"></i>

</div>

</div>



<div class="col-md-4 mb-3">

<div class="stats-card bg-warning">

<h5>Total Peminjam</h5>

<div class="number">

${dataPinjam.length}

</div>

<i class="fas fa-users"></i>

</div>

</div>

`;




// ======================
// TABEL PEMINJAMAN
// ======================

let tabel =
document.getElementById("bukuDipinjam");


tabel.innerHTML = "";


dataPinjam.forEach((item,index)=>{

tabel.innerHTML += `

<tr>

<td>${index + 1}</td>

<td>${item.nama}</td>

<td>${item.buku}</td>

<td>${item.tanggal}</td>

</tr>

`;

});

</script>

</body>
</html>
