<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Data Peminjaman</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
margin:0;
background:#eef2f7;
font-family:Arial;
}

.sidebar{
width:260px;
height:100vh;
background:linear-gradient(180deg,#4e73df,#224abe);
position:fixed;
color:white;
}

.logo{
text-align:center;
padding:30px;
border-bottom:1px solid rgba(255,255,255,0.2);
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:15px 25px;
}

.sidebar a:hover{
background:rgba(255,255,255,0.2);
}

.active{
background:rgba(255,255,255,0.2);
}

.main{
margin-left:260px;
padding:25px;
}

.topbar{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.card-box{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">

<i class="fas fa-book-reader fa-2x mb-2"></i>

<h4>PERPUSTAKAAN</h4>

</div>

<a href="dashboard.html">
<i class="fas fa-home me-2"></i>
Dashboard
</a>

<a href="anggota.html">
<i class="fas fa-users me-2"></i>
Anggota
</a>

<a href="buku.html">
<i class="fas fa-book me-2"></i>
Buku
</a>

<a href="peminjaman.html" class="active">
<i class="fas fa-hand-holding me-2"></i>
Peminjaman
</a>

</div>



<div class="main">

<div class="topbar">

<h3>

<i class="fas fa-hand-holding text-primary me-2"></i>

Data Peminjaman

</h3>

</div>



<div class="card-box">

<table class="table table-hover">

<thead class="table-dark">

<tr>

<th>No</th>
<th>Nama</th>
<th>Buku</th>
<th>Tanggal</th>
<th>Status</th>

</tr>

</thead>

<tbody id="dataPinjam">

</tbody>

</table>

</div>

</div>



<script>

let dataPinjam =
JSON.parse(localStorage.getItem("pinjam")) || [

{
nama:"Dewi",
buku:"Laskar Pelangi",
tanggal:"22/05/2026"
},

{
nama:"Siti",
buku:"Bumi",
tanggal:"23/05/2026"
}

];



let tabel =
document.getElementById("dataPinjam");



function tampilData(){

tabel.innerHTML = "";

dataPinjam.forEach((item,index)=>{

tabel.innerHTML += `

<tr>

<td>${index + 1}</td>

<td>${item.nama}</td>

<td>${item.buku}</td>

<td>${item.tanggal}</td>

<td>

<span class="badge bg-warning text-dark">

Dipinjam

</span>

</td>

</tr>

`;

});

}


tampilData();

</script>

</body>
</html>
