<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Data Buku</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
    margin:0;
    background:#eef2f7;
    font-family:Arial;
}

.sidebar{
    width:260px;
    height:100vh;
    background:linear-gradient(180deg,#4e73df,#224abe);
    position:fixed;
    left:0;
    top:0;
    color:white;
}

.logo{
    text-align:center;
    padding:30px 20px;
    border-bottom:1px solid rgba(255,255,255,0.2);
}

.logo i{
    font-size:45px;
}

.logo h4{
    margin-top:10px;
    font-weight:bold;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px 25px;
    transition:0.3s;
}

.sidebar a:hover{
    background:rgba(255,255,255,0.2);
    padding-left:35px;
}

.active{
    background:rgba(255,255,255,0.2);
}

.main{
    margin-left:260px;
    padding:25px;
}

.topbar{
    background:white;
    padding:20px 25px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
    margin-bottom:25px;
}

.card-box{
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.table td{
    vertical-align:middle;
}

.badge{
    padding:10px;
    border-radius:10px;
}

.btn{
    border-radius:10px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo">

        <i class="fas fa-book-reader"></i>

        <h4>PERPUSTAKAAN</h4>

    </div>

    <a href="dashboard.html">

        <i class="fas fa-home me-2"></i>

        Dashboard

    </a>

    <a href="anggota.html">

        <i class="fas fa-users me-2"></i>

        Anggota

    </a>

    <a href="buku.html" class="active">

        <i class="fas fa-book me-2"></i>

        Buku

    </a>

    <a href="peminjaman.html">

        <i class="fas fa-hand-holding me-2"></i>

        Peminjaman

    </a>

    <a href="dipinjam.html">

        <i class="fas fa-book-reader me-2"></i>

        Buku Dipinjam

    </a>

</div>



<!-- MAIN -->
<div class="main">

    <div class="topbar d-flex justify-content-between align-items-center">

        <div>

            <h3>

                <i class="fas fa-book text-primary me-2"></i>

                Data Buku

            </h3>

            <small class="text-muted">
                Kelola buku perpustakaan
            </small>

        </div>

        <button
        class="btn btn-primary"
        onclick="tambahBuku()">

            <i class="fas fa-plus me-2"></i>

            Tambah Buku

        </button>

    </div>



    <!-- TABLE -->
    <div class="card-box">

        <div class="table-responsive">

            <table class="table table-hover">

                <thead class="table-dark">

                    <tr>

                        <th>No</th>
                        <th>Judul Buku</th>
                        <th>Penulis</th>
                        <th>Tahun</th>
                        <th>Status</th>
                        <th>Aksi</th>

                    </tr>

                </thead>

                <tbody id="dataBuku">

                </tbody>

            </table>

        </div>

    </div>

</div>



<script>

// ==========================
// DATA BUKU
// ==========================

let buku =
JSON.parse(localStorage.getItem("buku")) || [

{
judul:"Laskar Pelangi",
penulis:"Andrea Hirata",
tahun:"2005",
status:"Dipinjam"
},

{
judul:"Bumi",
penulis:"Tere Liye",
tahun:"2014",
status:"Dipinjam"
},

{
judul:"Dilan 1990",
penulis:"Pidi Baiq",
tahun:"2014",
status:"Dipinjam"
},

{
judul:"Negeri 5 Menara",
penulis:"Ahmad Fuadi",
tahun:"2009",
status:"Dipinjam"
},

{
judul:"Ayat Ayat Cinta",
penulis:"Habiburrahman",
tahun:"2004",
status:"Tersedia"
},

{
judul:"Perahu Kertas",
penulis:"Dee Lestari",
tahun:"2009",
status:"Tersedia"
},

{
judul:"Pulang",
penulis:"Tere Liye",
tahun:"2015",
status:"Tersedia"
},

{
judul:"Rindu",
penulis:"Tere Liye",
tahun:"2014",
status:"Tersedia"
},

{
judul:"Sang Pemimpi",
penulis:"Andrea Hirata",
tahun:"2006",
status:"Tersedia"
},

{
judul:"5 CM",
penulis:"Donny Dhirgantoro",
tahun:"2005",
status:"Tersedia"
}

];



// ==========================
// SIMPAN DATA
// ==========================

function simpanData(){

localStorage.setItem(
"buku",
JSON.stringify(buku)
);

}



// ==========================
// TAMPILKAN BUKU
// ==========================

function tampilBuku(){

let tabel =
document.getElementById("dataBuku");

tabel.innerHTML = "";

buku.forEach((item,index)=>{

let warna =
item.status == "Tersedia"
?
"success"
:
"warning text-dark";


let icon =
item.status == "Tersedia"
?
"fa-circle-check"
:
"fa-book-reader";


tabel.innerHTML += `

<tr>

<td>

<span class="fw-bold text-primary">

#${index + 1}

</span>

</td>

<td>

<div class="d-flex align-items-center">

<div
class="bg-primary text-white rounded-circle d-flex justify-content-center align-items-center me-3"
style="width:45px;height:45px;">

<i class="fas fa-book"></i>

</div>

<div>

<div class="fw-bold">

${item.judul}

</div>

<small class="text-muted">

Novel Perpustakaan

</small>

</div>

</div>

</td>

<td>

<i class="fas fa-user-edit text-secondary me-2"></i>

${item.penulis}

</td>

<td>

<span class="badge bg-info">

${item.tahun}

</span>

</td>

<td>

<span class="badge bg-${warna}">

<i class="fas ${icon} me-1"></i>

${item.status}

</span>

</td>

<td>

<button
class="btn btn-primary btn-sm"
onclick="pinjamBuku(${index})">

<i class="fas fa-book-open"></i>

</button>

<button
class="btn btn-danger btn-sm"
onclick="hapusBuku(${index})">

<i class="fas fa-trash"></i>

</button>

</td>

</tr>

`;

});

}



// ==========================
// TAMBAH BUKU
// ==========================

function tambahBuku(){

let judul =
prompt("Masukkan Judul Buku");

let penulis =
prompt("Masukkan Penulis");

let tahun =
prompt("Masukkan Tahun");

if(judul && penulis && tahun){

buku.push({

judul:judul,
penulis:penulis,
tahun:tahun,
status:"Tersedia"

});

simpanData();

tampilBuku();

}

}



// ==========================
// HAPUS BUKU
// ==========================

function hapusBuku(index){

if(confirm("Yakin ingin hapus buku?")){

buku.splice(index,1);

simpanData();

tampilBuku();

}

}



// ==========================
// PINJAM BUKU
// ==========================

function pinjamBuku(index){

if(buku[index].status == "Dipinjam"){

alert("Buku sedang dipinjam!");

return;

}


let nama =
prompt("Masukkan Nama Peminjam");

if(!nama){

return;

}


let dataPinjam =
JSON.parse(localStorage.getItem("pinjam")) || [];


dataPinjam.push({

nama:nama,
buku:buku[index].judul,
tanggal:new Date().toLocaleDateString()

});


localStorage.setItem(
"pinjam",
JSON.stringify(dataPinjam)
);


buku[index].status = "Dipinjam";


simpanData();

tampilBuku();

alert("Buku berhasil dipinjam!");

}



// ==========================
// JALANKAN
// ==========================

tampilBuku();

</script>

</body>
</html>
